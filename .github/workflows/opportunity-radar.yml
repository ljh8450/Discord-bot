name: Opportunity Radar

on:
  schedule:
    # Retry every 10 minutes so a delayed or dropped schedule event is
    # recovered by the next off-peak invocation.
    - cron: "7,17,27,37,47,57 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: opportunity-radar
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: npm test
      - run: npm run radar
        env:
          DISCORD_JOBS_WEBHOOK_URL: ${{ secrets.DISCORD_JOBS_WEBHOOK_URL }}
          DISCORD_HACKATHONS_WEBHOOK_URL: ${{ secrets.DISCORD_HACKATHONS_WEBHOOK_URL }}
          DISCORD_INSIGHTS_WEBHOOK_URL: ${{ secrets.DISCORD_INSIGHTS_WEBHOOK_URL }}
          DISCORD_ACTIVITIES_WEBHOOK_URL: ${{ secrets.DISCORD_ACTIVITIES_WEBHOOK_URL }}
          DISCORD_EDUCATION_WEBHOOK_URL: ${{ secrets.DISCORD_EDUCATION_WEBHOOK_URL }}
          DISCORD_OPERATIONS_WEBHOOK_URL: ${{ secrets.DISCORD_OPERATIONS_WEBHOOK_URL }}
          DISCORD_OPPORTUNITIES_WEBHOOK_URL: ${{ secrets.DISCORD_OPPORTUNITIES_WEBHOOK_URL }}
          FEEDBACK_BASE_URL: ${{ vars.FEEDBACK_BASE_URL }}
          RADAR_MAX_NOTIFICATIONS_PER_RUN: ${{ vars.RADAR_MAX_NOTIFICATIONS_PER_RUN }}
          SARAMIN_ACCESS_KEY: ${{ secrets.SARAMIN_ACCESS_KEY }}
      - name: Report successful run heartbeat
        if: success()
        env:
          RADAR_HEARTBEAT_URL: ${{ secrets.RADAR_HEARTBEAT_URL }}
        run: npm run heartbeat
      - name: Persist delivery state
        if: always()
        run: |
          git status --porcelain -- data/state.json | grep -q . || exit 0
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/state.json
          git commit -m "chore: persist opportunity radar state"
          git push
