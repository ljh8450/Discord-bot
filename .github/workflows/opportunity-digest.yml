name: Opportunity Developer Brief

on:
  schedule:
    - cron: "0 0 * * *"
    - cron: "0 9 * * *"
  workflow_dispatch:

concurrency:
  group: opportunity-radar
  cancel-in-progress: false

permissions:
  contents: write
  models: read

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: npm test
      - run: node src/brief-cli.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_MODELS_MODEL: openai/gpt-4o-mini
          DISCORD_INSIGHTS_WEBHOOK_URL: ${{ secrets.DISCORD_INSIGHTS_WEBHOOK_URL }}
          DISCORD_OPERATIONS_WEBHOOK_URL: ${{ secrets.DISCORD_OPERATIONS_WEBHOOK_URL }}
      - name: Persist brief state
        if: always()
        run: |
          git status --porcelain -- data/state.json | grep -q . || exit 0
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/state.json
          git commit -m 'chore: persist developer brief state'
          for attempt in 1 2 3; do
            git fetch origin main
            git rebase origin/main
            git push origin HEAD:main && exit 0
            sleep $((attempt * 2))
          done
          exit 1
